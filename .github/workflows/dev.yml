name: Backend CI/CD v2

on:
  pull_request:
    branches:
      - dev

  push:
    branches:
      - dev

permissions:
  actions: write
  contents: read

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # 1) CI
  ci:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 21
      - name: Set up JDK 21 (with Gradle cache)
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      # 3. gradlew 권한
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ========================================
      # 4. 정적 분석 (Static Analysis)
      # ========================================

      # SpotBugs(버그패턴 캐치) : null위험, 무한 루프 등
      - name: Run SpotBugs
        run: ./gradlew spotbugsMain

      # PMD(좋지 않은 코드 습관 캐치) : 중복코드, 안쓰는 변수 등
      - name: Run PMD
        run: ./gradlew pmdMain

      # Checkstyle(코드 스타일) : 들여쓰기, 네이밍 규칙, 공백 등
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain

      # 5. 테스트
      - name: Run Tests
        run: ./gradlew test

      # 6. 빌드 (JAR 생성)
      - name: Build JAR
        run: ./gradlew build -x test

      # 7. JAR artifact 업로드 (CD에서 재사용)
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  ci-notify-success:
    needs: ci
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CI success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          title: "🟢 개발서버 백엔드 CI 성공"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 개발서버 백엔드 CI 성공!"
          color: 0x00FF00

  ci-notify-failure:
    needs: ci
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CI failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          title: "🔴 개발서버 백엔드 CI 실패"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 개발서버 백엔드 CI 실패!"
          color: 0xFF0000

  # 2) CD
  cd:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # CI에서 빌드한 JAR 다운로드
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      # AWS 자격 증명
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # ECR 로그인
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker 이미지 빌드 & push
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend:${{ github.sha }}
            219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSM으로 인스턴스에 배포
      - name: Deploy with SSM (docker compose)
        run: |
          set -euo pipefail

          cat > /tmp/ssm-params.json << 'ENDJSON'
          {
            "commands": [
              "set -eu",
              "cd /home/ubuntu",
              "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com",
              "> /home/ubuntu/.env",
              "echo '# ------------- COMMON --------------' >> /home/ubuntu/.env",
              "aws ssm get-parameters-by-path --path '/MINE/MVP1/BE/ENV/COMMON' --with-decryption --query 'Parameters[*].[Name,Value]' --output text --region ap-northeast-2 | while IFS=$(printf '\\t') read -r name value; do key=$(basename \"$name\"); echo \"$key=${value:-}\" >> /home/ubuntu/.env; done",
              "echo '' >> /home/ubuntu/.env",
              "echo '# ------------- DEV --------------' >> /home/ubuntu/.env",
              "aws ssm get-parameters-by-path --path '/MINE/MVP1/BE/ENV/DEV' --with-decryption --query 'Parameters[*].[Name,Value]' --output text --region ap-northeast-2 | while IFS=$(printf '\\t') read -r name value; do key=$(basename \"$name\"); echo \"$key=${value:-}\" >> /home/ubuntu/.env; done",
              "docker pull 219268921033.dkr.ecr.ap-northeast-2.amazonaws.com/imyme-backend:dev-latest",
              "docker compose up -d",
              "docker image prune -f"
            ]
          }
          ENDJSON

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ secrets.DEV_INSTANCE_ID }}" \
            --comment "backend dev deploy (${GITHUB_SHA})" \
            --parameters file:///tmp/ssm-params.json \
            --region ap-northeast-2 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          for i in {1..60}; do
            STATUS=$(aws ssm list-commands \
              --command-id "${COMMAND_ID}" \
              --region ap-northeast-2 \
              --query "Commands[0].Status" \
              --output text)
            echo "SSM status: ${STATUS}"

            if [ "${STATUS}" = "Success" ]; then
              break
            fi

            if [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ] || [ "${STATUS}" = "Cancelling" ]; then
              aws ssm list-command-invocations \
                --command-id "${COMMAND_ID}" \
                --details \
                --region ap-northeast-2 \
                --output json
              exit 1
            fi

            sleep 10
          done

          if [ "${STATUS}" != "Success" ]; then
            echo "SSM deploy timeout"
            aws ssm list-command-invocations \
              --command-id "${COMMAND_ID}" \
              --details \
              --region ap-northeast-2 \
              --output json
            exit 1
          fi

      # 스모크 테스트
      - name: Post-deploy Smoke Test
        run: |
          BASE_URL="${{ secrets.DEV_BASE_URL }}"
          for i in $(seq 1 12); do
            echo "Attempt $i/12..."
            if curl -fsS "$BASE_URL/server/health" >/dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 120s"
          exit 1

  cd-notify-success:
    needs: cd
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CD success
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: success
          title: "🟢 개발서버 백엔드 배포 성공"
          content: "개발서버 백엔드 배포 완료!"
          color: 0x00FF00

  cd-notify-failure:
    needs: cd
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord CD failure
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_BE }}
          status: failure
          title: "🔴 개발서버 백엔드 배포 실패"
          content: "<@&${{ secrets.BACKEND_ROLE_ID }}> 개발서버 백엔드 배포 실패!"
          color: 0xFF0000
