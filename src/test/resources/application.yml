spring:
    config:
        activate:
            on-profile: test

    datasource:
        # 🌟 여기가 핵심! 실제 DB 주소 대신 '메모리 DB' 주소를 씁니다.
        url: jdbc:h2:mem:testdb;MODE=PostgreSQL
        driver-class-name: org.h2.Driver
        username: sa
        password:

    jpa:
        hibernate:
            ddl-auto: create-drop # 테스트 끝나면 데이터 삭제
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect

# 다른 필수 변수들도 가짜값으로 채워줍니다 (에러 방지용)
jwt:
    secret: test_secret_key_blah_blah_blah
cloud:
    aws:
        credentials:
            access-key: test
            secret-key: test
        region:
            static: ap-northeast-2
        s3:
            bucket: test-bucket
security:
    oauth2:
        client:
            registration:
                kakao:
                    client-id: test
                    client-secret: test
                    redirect-uri: http://test
