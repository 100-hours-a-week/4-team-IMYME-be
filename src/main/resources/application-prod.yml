spring:
    config:
        activate:
            on-profile: prod

    flyway:
        locations: classpath:db/migration

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false      # 운영에선 쿼리 로그 끔
        open-in-view: false

    # Prod 환경 카카오 OAuth 설정
    security:
        oauth2:
            client:
                registration:
                    kakao:
                        redirect-uri: ${FRONTEND_URL_PROD}/auth/callback/kakao

    # Prod 환경 Redis 설정
    # ElastiCache: TLS ON, ACL 사용 (최고 보안 수준)
    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT:6379}
            password: ${REDIS_PASSWORD}  # AWS Secrets Manager에서 주입
            ssl:
                enabled: true  # TLS 필수
            timeout: 5000ms
            lettuce:
                pool:
                    max-active: 20
                    max-idle: 10
                    min-idle: 5
                    max-wait: 5000ms

logging:
    level:
        root: INFO
        com.imyme.mine: INFO
        org.springframework.security: INFO
        # 운영에선 쿼리 로그 끄거나 에러만 봄
        org.hibernate.SQL: WARN

# (선택) 운영 환경에서 배치 작업을 켜려면 여기서 설정
knowledge:
    batch:
        enabled: false
